<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TyreVision AI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
header { padding: 10px 16px; background: #111; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header h1 { font-size: 1rem; font-weight: 800; }
header h1 span { color: #e63946; }
.by { font-size: 0.62rem; color: #555; margin-top: 1px; }
.history-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }

/* ── PAGE: CAMERA ── */
#cameraPage { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.camera-wrap { position: relative; flex: 1; background: #000; overflow: hidden; }
#video { width: 100%; height: 100%; object-fit: cover; display: block; }

.scan-guide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.scan-box { width: 75vw; max-width: 320px; aspect-ratio: 1; border: 2px solid rgba(230,57,70,0.7); border-radius: 12px; position: relative; }
.corner { position: absolute; width: 16px; height: 16px; border-color: #e63946; border-style: solid; }
.corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
.corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; }
.corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; }
.corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

.hint { position: absolute; bottom: 16px; left: 0; right: 0; text-align: center; font-size: 0.75rem; color: rgba(255,255,255,0.5); }

.bottom-bar { padding: 16px 20px 28px; background: #111; border-top: 1px solid #222; display: flex; justify-content: center; flex-shrink: 0; }
.shutter {
  width: 70px; height: 70px; border-radius: 50%;
  background: #e63946; border: 4px solid #fff;
  cursor: pointer; box-shadow: 0 0 0 3px #e63946;
  transition: transform 0.1s;
}
.shutter:active { transform: scale(0.93); }

/* ── PAGE: RESULT (terminal) ── */
#resultPage { flex: 1; display: none; flex-direction: column; overflow: hidden; }

.result-header { padding: 12px 16px; background: #111; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.back-btn { background: none; border: 1px solid #333; color: #aaa; padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }

.terminal {
  flex: 1; overflow-y: auto; padding: 16px;
  font-family: 'Courier New', monospace; font-size: 0.82rem;
  line-height: 1.7; background: #0a0a0a;
}

.t-line { display: flex; gap: 8px; opacity: 0; animation: fadein 0.3s forwards; }
.t-prompt { color: #e63946; flex-shrink: 0; }
.t-text { color: #f0f0f0; }
.t-text.green { color: #52b788; }
.t-text.yellow { color: #ffd166; }
.t-text.red { color: #e63946; }
.t-text.muted { color: #666; }
.t-text.bold { font-weight: 700; }
.cursor { display: inline-block; width: 8px; height: 14px; background: #e63946; animation: blink 1s infinite; vertical-align: middle; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fadein { to { opacity: 1; } }

.annotated-wrap { padding: 0 16px 8px; flex-shrink: 0; }
.annotated-wrap img { width: 100%; border-radius: 10px; border: 1px solid #222; }

.result-bottom { padding: 12px 16px 24px; background: #111; border-top: 1px solid #222; flex-shrink: 0; }
.scan-again { width: 100%; padding: 14px; background: #e63946; color: #fff; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }

/* HISTORY */
.history-panel { position: fixed; inset: 0; background: #0a0a0a; z-index: 100; display: none; flex-direction: column; }
.history-panel.show { display: flex; }
.history-head { padding: 16px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
.close-btn { background: none; border: none; color: #aaa; font-size: 1.3rem; cursor: pointer; }
.history-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.h-item { background: #1a1a1a; border: 1px solid #222; border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; }
.h-thumb { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: #333; flex-shrink: 0; }
.h-info { flex: 1; }
.h-info h4 { font-size: 0.85rem; font-weight: 700; margin-bottom: 3px; }
.h-info p { font-size: 0.72rem; color: #888; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
.Safe { background: #2d6a4f; color: #b7e4c7; }
.Warning { background: #7b4f00; color: #ffd166; }
.Danger { background: #6b1a1a; color: #ffb3b3; }
.empty { text-align: center; padding: 60px 20px; color: #666; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🔴 Tyre<span>Vision</span> AI</h1>
    <div class="by">by Dhaval Chorwadkar</div>
  </div>
  <button class="history-btn" id="historyBtn">📋 History</button>
</header>

<!-- CAMERA PAGE -->
<div id="cameraPage">
  <div class="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-guide">
      <div class="scan-box">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
    </div>
    <div class="hint">Align tyre tread inside the frame</div>
  </div>
  <div class="bottom-bar">
    <button class="shutter" id="shutterBtn"></button>
  </div>
</div>

<!-- RESULT PAGE -->
<div id="resultPage">
  <div class="result-header">
    <button class="back-btn" id="backBtn">← Back</button>
    <span style="font-size:0.85rem; color:#888; font-family:monospace;">tyrevision_ai ~ analysis</span>
  </div>
  <div class="annotated-wrap" id="annotatedWrap" style="display:none;">
    <img id="annotatedImg" alt="Analysed tyre" />
  </div>
  <div class="terminal" id="terminal"></div>
  <div class="result-bottom">
    <button class="scan-again" id="scanAgainBtn">📸 Scan Another Tyre</button>
  </div>
</div>

<!-- HISTORY -->
<div class="history-panel" id="historyPanel">
  <div class="history-head">
    <h2>📋 Scan History</h2>
    <button class="close-btn" id="closeHistory">✕</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<canvas id="captureCanvas" style="display:none;"></canvas>

<script>
const video = document.getElementById('video');
const terminal = document.getElementById('terminal');
const API = window.location.origin + '/detect';

// Start camera
navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false })
  .then(s => video.srcObject = s)
  .catch(() => alert('Camera permission denied.'));

// Shutter click
document.getElementById('shutterBtn').addEventListener('click', async () => {
  const canvas = document.getElementById('captureCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  canvas.toBlob(async (blob) => {
    showResultPage();
    terminal.innerHTML = '';
    addLine('$', 'tyrevision --analyze tyre.jpg', 'muted');
    await sleep(400);
    addLine('>', 'Initializing YOLO-World detector...', 'muted');
    await sleep(500);
    addLine('>', 'Sending image to AI engine...', 'muted');
    addCursor();

    const form = new FormData();
    form.append('file', blob, 'tyre.jpg');

    try {
      const res = await fetch(API, { method: 'POST', body: form });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      removeCursor();
      await renderTerminal(data);
      saveHistory(data);
      if (data.annotated_image) {
        document.getElementById('annotatedImg').src = 'data:image/jpeg;base64,' + data.annotated_image;
        document.getElementById('annotatedWrap').style.display = 'block';
      }
    } catch (e) {
      removeCursor();
      addLine('✗', 'Error: ' + e.message, 'red');
    }
  }, 'image/jpeg', 0.85);
});

async function renderTerminal(data) {
  addLine('✓', 'Analysis complete.', 'green');
  await sleep(300);
  addLine('─', '─────────────────────────────', 'muted');
  await sleep(200);

  // YOLO detections
  addLine('>', 'YOLO Detections:', 'muted');
  await sleep(200);
  if (data.detections && data.detections.length > 0) {
    for (const d of data.detections) {
      await sleep(150);
      addLine('  ⚑', `${d.label}  [${Math.round(d.confidence * 100)}%]`, 'yellow');
    }
  } else {
    await sleep(150);
    addLine('  ✓', 'No visible defects detected', 'green');
  }

  await sleep(300);
  addLine('─', '─────────────────────────────', 'muted');
  await sleep(200);

  // Tread depth
  const mm = data.tread_depth_mm;
  const depthColor = mm === null ? 'muted' : mm > 3 ? 'green' : mm >= 1.6 ? 'yellow' : 'red';
  addLine('>', 'Tread Depth:', 'muted');
  await sleep(200);
  addLine('  →', mm !== null ? `${mm} mm` : 'Unable to determine', depthColor + ' bold');

  await sleep(300);
  // Status
  const statusColor = { Safe: 'green', Warning: 'yellow', Danger: 'red' }[data.status] || 'yellow';
  addLine('>', 'Safety Status:', 'muted');
  await sleep(200);
  addLine('  →', `${data.status}  (Confidence: ${data.confidence})`, statusColor + ' bold');

  await sleep(300);
  addLine('─', '─────────────────────────────', 'muted');
  await sleep(200);

  // Summary
  addLine('>', 'Summary:', 'muted');
  await sleep(200);
  addLine('  ', data.summary, '');

  await sleep(300);
  // Recommendation
  addLine('>', 'Recommendation:', 'muted');
  await sleep(200);
  addLine('  ⚠', data.recommendation, 'yellow');

  await sleep(400);
  addLine('─', '─────────────────────────────', 'muted');
  addLine('$', '█', 'muted');
}

function addLine(prompt, text, cls) {
  const el = document.createElement('div');
  el.className = 't-line';
  el.style.animationDelay = '0s';
  el.innerHTML = `<span class="t-prompt">${prompt}</span><span class="t-text ${cls}">${text}</span>`;
  terminal.appendChild(el);
  terminal.scrollTop = terminal.scrollHeight;
}

function addCursor() {
  const el = document.createElement('div');
  el.className = 't-line';
  el.id = 'cursorLine';
  el.innerHTML = `<span class="t-prompt">></span><span class="t-text muted">Processing <span class="cursor"></span></span>`;
  terminal.appendChild(el);
  terminal.scrollTop = terminal.scrollHeight;
}

function removeCursor() {
  const el = document.getElementById('cursorLine');
  if (el) el.remove();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showResultPage() {
  document.getElementById('cameraPage').style.display = 'none';
  const rp = document.getElementById('resultPage');
  rp.style.display = 'flex';
  document.getElementById('annotatedWrap').style.display = 'none';
}

function showCameraPage() {
  document.getElementById('resultPage').style.display = 'none';
  document.getElementById('cameraPage').style.display = 'flex';
}

document.getElementById('backBtn').addEventListener('click', showCameraPage);
document.getElementById('scanAgainBtn').addEventListener('click', showCameraPage);

// History
function saveHistory(data) {
  const h = JSON.parse(localStorage.getItem('tv_h') || '[]');
  h.unshift({ status: data.status, summary: data.summary, depth: data.tread_depth_mm, thumb: data.annotated_image, date: new Date().toISOString() });
  localStorage.setItem('tv_h', JSON.stringify(h.slice(0, 30)));
}

document.getElementById('historyBtn').addEventListener('click', () => {
  const h = JSON.parse(localStorage.getItem('tv_h') || '[]');
  const list = document.getElementById('historyList');
  list.innerHTML = h.length ? h.map((r, i) => `
    <div class="h-item">
      ${r.thumb ? `<img class="h-thumb" src="data:image/jpeg;base64,${r.thumb}" />` : '<div class="h-thumb"></div>'}
      <div class="h-info">
        <h4>Scan #${h.length - i} &nbsp;<span class="badge ${r.status}">${r.status}</span></h4>
        <p>${new Date(r.date).toLocaleString('en-IN')}</p>
        <p style="margin-top:3px;">${r.depth !== null ? r.depth + ' mm tread' : 'Depth N/A'}</p>
      </div>
    </div>`).join('') : '<div class="empty">No scans yet</div>';
  document.getElementById('historyPanel').classList.add('show');
});

document.getElementById('closeHistory').addEventListener('click', () => {
  document.getElementById('historyPanel').classList.remove('show');
});
</script>
</body>
</html>
