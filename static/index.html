<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TyreVision AI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
header { padding: 12px 16px; background: #111; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header h1 { font-size: 1rem; font-weight: 800; }
header h1 span { color: #e63946; }
.history-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }

/* CAMERA */
.camera-wrap { position: relative; flex: 1; background: #000; overflow: hidden; }
#video { width: 100%; height: 100%; object-fit: cover; }

/* SCAN OVERLAY */
.overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
.scan-box {
  width: 75vw; max-width: 320px;
  aspect-ratio: 1;
  border: 2px solid #e63946;
  border-radius: 12px;
  position: relative;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
}
.scan-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #e63946, transparent);
  animation: scan 2s ease-in-out infinite;
}
@keyframes scan { 0%,100% { top: 0; } 50% { top: calc(100% - 2px); } }
.scan-hint { margin-top: 16px; font-size: 0.75rem; color: rgba(255,255,255,0.6); background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 20px; }

/* RESULT OVERLAY - slides up */
.result-panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #111;
  border-top: 1px solid #222;
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 12px;
  transform: translateY(100%);
  transition: transform 0.35s ease;
  max-height: 55vh;
  overflow-y: auto;
}
.result-panel.show { transform: translateY(0); }

.result-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.depth-big { font-size: 2.4rem; font-weight: 900; }
.depth-big small { font-size: 1rem; color: #888; }
.badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
.Safe { background: #2d6a4f; color: #b7e4c7; }
.Warning { background: #7b4f00; color: #ffd166; }
.Danger { background: #6b1a1a; color: #ffb3b3; }

.problems { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.problem-tag { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 3px 10px; font-size: 0.75rem; color: #ccc; }

.info-row { background: #1a1a1a; border-radius: 10px; padding: 12px; font-size: 0.83rem; line-height: 1.6; }
.info-row .rec { color: #e63946; font-weight: 600; margin-top: 6px; }

/* BOTTOM BAR */
.bottom-bar { padding: 12px 20px 24px; background: #111; border-top: 1px solid #222; display: flex; gap: 10px; flex-shrink: 0; }
#captureBtn {
  flex: 1;
  background: #e63946;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
}
#captureBtn:disabled { background: #444; }
#retakeBtn {
  background: #1a1a1a;
  border: 1px solid #333;
  color: #ccc;
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 0.85rem;
  cursor: pointer;
  display: none;
}

/* LOADER */
.loader { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
.loader.show { display: flex; }
.spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #e63946; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader p { font-size: 0.85rem; color: #aaa; }

/* HISTORY PANEL */
.history-panel {
  position: fixed; inset: 0; background: #0a0a0a; z-index: 100;
  display: none; flex-direction: column;
}
.history-panel.show { display: flex; }
.history-head { padding: 16px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
.history-head h2 { font-size: 1rem; font-weight: 700; }
.close-btn { background: none; border: none; color: #aaa; font-size: 1.3rem; cursor: pointer; }
.history-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.h-item { background: #1a1a1a; border: 1px solid #222; border-radius: 10px; padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; }
.h-thumb { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: #333; flex-shrink: 0; }
.h-info { flex: 1; }
.h-info h4 { font-size: 0.85rem; font-weight: 700; }
.h-info p { font-size: 0.75rem; color: #888; margin-top: 2px; }
.h-depth { font-size: 1.3rem; font-weight: 900; }
.empty { text-align: center; padding: 60px 20px; color: #666; }
</style>
</head>
<body>

<header>
  <h1>🔴 Tyre<span>Vision</span> AI</h1>
  <button class="history-btn" id="historyBtn">📋 History</button>
</header>

<div class="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <div class="overlay">
    <div class="scan-box"><div class="scan-line"></div></div>
    <div class="scan-hint">Align tyre tread inside frame</div>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Analysing tyre problems...</p>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="result-top">
      <div class="depth-big" id="depthBig">—<small> mm</small></div>
      <span class="badge" id="statusBadge"></span>
    </div>
    <div class="problems" id="problemTags"></div>
    <div class="info-row">
      <div id="summaryText"></div>
      <div class="rec" id="recText"></div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <button id="retakeBtn">↩ Retake</button>
  <button id="captureBtn">📸 Scan Tyre</button>
</div>

<!-- History Panel -->
<div class="history-panel" id="historyPanel">
  <div class="history-head">
    <h2>📋 Scan History</h2>
    <button class="close-btn" id="closeHistory">✕</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const captureBtn = document.getElementById('captureBtn');
const retakeBtn = document.getElementById('retakeBtn');
const loader = document.getElementById('loader');
const resultPanel = document.getElementById('resultPanel');

// Backend URL — change to your deployed URL
const API_URL = window.location.origin + '/analyze';

// Start rear camera
navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false })
  .then(s => video.srcObject = s)
  .catch(() => alert('Camera permission denied. Please allow camera access.'));

captureBtn.addEventListener('click', async () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  canvas.toBlob(async (blob) => {
    loader.classList.add('show');
    captureBtn.disabled = true;
    resultPanel.classList.remove('show');

    const form = new FormData();
    form.append('file', blob, 'tyre.jpg');

    try {
      const res = await fetch(API_URL, { method: 'POST', body: form });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      showResult(data, canvas.toDataURL('image/jpeg', 0.6));
      saveHistory(data, canvas.toDataURL('image/jpeg', 0.4));
    } catch (e) {
      alert('Error: ' + e.message);
    } finally {
      loader.classList.remove('show');
      captureBtn.disabled = false;
    }
  }, 'image/jpeg', 0.85);
});

function showResult(d, img) {
  const mm = d.tread_depth_mm;
  document.getElementById('depthBig').innerHTML =
    mm !== null ? `${mm}<small> mm</small>` : `N/A<small></small>`;

  const badge = document.getElementById('statusBadge');
  badge.textContent = d.status;
  badge.className = 'badge ' + d.status;

  const tags = document.getElementById('problemTags');
  tags.innerHTML = (d.problems || []).map(p =>
    `<span class="problem-tag">${p}</span>`
  ).join('') || '<span class="problem-tag">No issues detected</span>';

  document.getElementById('summaryText').textContent = d.summary;
  document.getElementById('recText').textContent = '→ ' + d.recommendation;

  resultPanel.classList.add('show');
  retakeBtn.style.display = 'block';
  captureBtn.textContent = '📸 Scan Again';
}

retakeBtn.addEventListener('click', () => {
  resultPanel.classList.remove('show');
  retakeBtn.style.display = 'none';
  captureBtn.textContent = '📸 Scan Tyre';
});

// History
function saveHistory(data, thumb) {
  const h = JSON.parse(localStorage.getItem('th') || '[]');
  h.unshift({ ...data, thumb, date: new Date().toISOString() });
  localStorage.setItem('th', JSON.stringify(h.slice(0, 30)));
}

document.getElementById('historyBtn').addEventListener('click', () => {
  const h = JSON.parse(localStorage.getItem('th') || '[]');
  const list = document.getElementById('historyList');
  if (!h.length) {
    list.innerHTML = '<div class="empty">No scans yet</div>';
  } else {
    list.innerHTML = h.map((r, i) => `
      <div class="h-item">
        ${r.thumb ? `<img class="h-thumb" src="${r.thumb}" />` : '<div class="h-thumb"></div>'}
        <div class="h-info">
          <h4>Scan #${h.length - i} &nbsp;<span class="badge ${r.status}" style="font-size:0.65rem;">${r.status}</span></h4>
          <p>${new Date(r.date).toLocaleString('en-IN')}</p>
          <p style="margin-top:4px;font-size:0.72rem;color:#aaa;">${(r.problems||[]).slice(0,2).join(', ') || 'No issues'}</p>
        </div>
        <div class="h-depth" style="color:${r.status==='Safe'?'#52b788':r.status==='Warning'?'#ffd166':'#e63946'}">
          ${r.tread_depth_mm !== null ? r.tread_depth_mm+'mm' : 'N/A'}
        </div>
      </div>
    `).join('');
  }
  document.getElementById('historyPanel').classList.add('show');
});

document.getElementById('closeHistory').addEventListener('click', () => {
  document.getElementById('historyPanel').classList.remove('show');
});
</script>
</body>
</html>
