<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TyreVision AI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

header { padding: 10px 16px; background: #111; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header h1 { font-size: 1rem; font-weight: 800; }
header h1 span { color: #e63946; }
.by { font-size: 0.62rem; color: #555; margin-top: 1px; }
.history-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }

/* CAMERA */
.camera-wrap { position: relative; flex: 1; background: #000; overflow: hidden; }
#video { width: 100%; height: 100%; object-fit: cover; display: block; }

/* Canvas overlays video for bounding boxes */
#overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

/* Scan frame guide */
.scan-guide {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.scan-box {
  width: 75vw; max-width: 320px; aspect-ratio: 1;
  border: 2px solid rgba(230,57,70,0.6);
  border-radius: 12px;
}

/* Status bar */
.status-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 20px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.detection-label {
  font-size: 0.8rem; font-weight: 600;
  background: rgba(230,57,70,0.9);
  padding: 4px 12px; border-radius: 20px;
}
.fps-badge { font-size: 0.7rem; color: #aaa; }

/* BOTTOM BAR */
.bottom-bar { padding: 12px 20px 24px; background: #111; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; flex-shrink: 0; }

.live-btn {
  flex: 1; padding: 14px;
  border: none; border-radius: 12px;
  font-size: 0.95rem; font-weight: 700; cursor: pointer;
  transition: background 0.2s;
}
.live-btn.start { background: #e63946; color: #fff; }
.live-btn.stop { background: #333; color: #e63946; border: 1px solid #e63946; }

.capture-btn {
  background: #1a1a1a; border: 1px solid #333; color: #ccc;
  border-radius: 12px; padding: 14px 16px; font-size: 0.85rem; cursor: pointer;
}

/* RESULT PANEL */
.result-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: #111; border-top: 1px solid #222; border-radius: 20px 20px 0 0;
  padding: 20px; transform: translateY(100%); transition: transform 0.3s ease;
  max-height: 50vh; overflow-y: auto;
}
.result-panel.show { transform: translateY(0); }
.result-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: #666; font-size: 1.1rem; cursor: pointer; }

.badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; }
.Safe { background: #2d6a4f; color: #b7e4c7; }
.Warning { background: #7b4f00; color: #ffd166; }
.Danger { background: #6b1a1a; color: #ffb3b3; }

.det-list { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
.det-tag { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 3px 10px; font-size: 0.75rem; }

/* HISTORY */
.history-panel { position: fixed; inset: 0; background: #0a0a0a; z-index: 100; display: none; flex-direction: column; }
.history-panel.show { display: flex; }
.history-head { padding: 16px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
.close-btn { background: none; border: none; color: #aaa; font-size: 1.3rem; cursor: pointer; }
.history-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.h-item { background: #1a1a1a; border: 1px solid #222; border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; }
.h-thumb { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: #333; flex-shrink: 0; }
.h-info { flex: 1; font-size: 0.82rem; }
.h-info h4 { font-weight: 700; margin-bottom: 3px; }
.h-info p { color: #888; font-size: 0.72rem; }
.empty { text-align: center; padding: 60px 20px; color: #666; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🔴 Tyre<span>Vision</span> AI</h1>
    <div class="by">by Dhaval Chorwadkar</div>
  </div>
  <button class="history-btn" id="historyBtn">📋 History</button>
</header>

<div class="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>

  <div class="scan-guide" id="scanGuide">
    <div class="scan-box"></div>
  </div>

  <div class="status-bar" id="statusBar" style="display:none;">
    <span class="detection-label" id="detLabel">Scanning...</span>
    <span class="fps-badge" id="fpsBadge"></span>
  </div>

  <div class="result-panel" id="resultPanel">
    <button class="result-close" id="resultClose">✕</button>
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
      <strong style="font-size:1rem;">Scan Result</strong>
      <span class="badge" id="statusBadge"></span>
    </div>
    <img id="annotatedImg" style="width:100%; border-radius:8px; margin-bottom:12px;" />
    <div style="font-size:0.85rem;" id="summaryText"></div>
    <div class="det-list" id="detTags"></div>
  </div>
</div>

<div class="bottom-bar">
  <button class="capture-btn" id="captureBtn">📸 Snapshot</button>
  <button class="live-btn start" id="liveBtn">▶ Start Live Scan</button>
</div>

<!-- History -->
<div class="history-panel" id="historyPanel">
  <div class="history-head">
    <h2>📋 Scan History</h2>
    <button class="close-btn" id="closeHistory">✕</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<canvas id="captureCanvas" style="display:none;"></canvas>

<script>
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d');
const liveBtn = document.getElementById('liveBtn');
const captureBtn = document.getElementById('captureBtn');
const statusBar = document.getElementById('statusBar');
const scanGuide = document.getElementById('scanGuide');

const API = window.location.origin + '/detect';
let liveInterval = null;
let isLive = false;
let lastFps = 0, frameCount = 0, fpsTimer = Date.now();

// Start camera
navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false })
  .then(s => {
    video.srcObject = s;
    video.onloadedmetadata = () => resizeOverlay();
  })
  .catch(() => alert('Camera permission denied.'));

function resizeOverlay() {
  overlay.width = video.videoWidth;
  overlay.height = video.videoHeight;
  overlay.style.width = '100%';
  overlay.style.height = '100%';
}

window.addEventListener('resize', resizeOverlay);

// Capture frame as blob
function captureBlob(quality = 0.7) {
  const c = document.getElementById('captureCanvas');
  c.width = video.videoWidth;
  c.height = video.videoHeight;
  c.getContext('2d').drawImage(video, 0, 0);
  return new Promise(res => c.toBlob(res, 'image/jpeg', quality));
}

// Draw bounding boxes on overlay
function drawBoxes(detections, vidW, vidH) {
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  const scaleX = overlay.width / vidW;
  const scaleY = overlay.height / vidH;

  detections.forEach(d => {
    const [x1, y1, x2, y2] = d.bbox;
    const sx1 = x1 * scaleX, sy1 = y1 * scaleY;
    const sw = (x2 - x1) * scaleX, sh = (y2 - y1) * scaleY;

    ctx.strokeStyle = '#e63946';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx1, sy1, sw, sh);

    const text = `${d.label} ${Math.round(d.confidence * 100)}%`;
    ctx.fillStyle = '#e63946';
    ctx.fillRect(sx1, sy1 - 20, ctx.measureText(text).width + 10, 20);
    ctx.fillStyle = '#fff';
    ctx.font = '13px -apple-system, sans-serif';
    ctx.fillText(text, sx1 + 5, sy1 - 5);
  });
}

// Send frame to backend
async function sendFrame() {
  try {
    const blob = await captureBlob(0.6);
    const form = new FormData();
    form.append('file', blob, 'frame.jpg');

    const res = await fetch(API, { method: 'POST', body: form });
    if (!res.ok) return;
    const data = await res.json();

    drawBoxes(data.detections, video.videoWidth, video.videoHeight);

    // Update status label
    const label = data.detections.length > 0
      ? `${data.detections.length} detected`
      : 'Scanning...';
    document.getElementById('detLabel').textContent = label;

    // FPS counter
    frameCount++;
    if (Date.now() - fpsTimer > 1000) {
      document.getElementById('fpsBadge').textContent = frameCount + ' fps';
      frameCount = 0;
      fpsTimer = Date.now();
    }
  } catch (e) { /* silent fail on live */ }
}

// Live scan toggle
liveBtn.addEventListener('click', () => {
  if (!isLive) {
    isLive = true;
    liveBtn.textContent = '⏹ Stop Live Scan';
    liveBtn.className = 'live-btn stop';
    scanGuide.style.display = 'none';
    statusBar.style.display = 'flex';
    liveInterval = setInterval(sendFrame, 1500); // every 1.5s
  } else {
    isLive = false;
    liveBtn.textContent = '▶ Start Live Scan';
    liveBtn.className = 'live-btn start';
    scanGuide.style.display = 'flex';
    statusBar.style.display = 'none';
    clearInterval(liveInterval);
    ctx.clearRect(0, 0, overlay.width, overlay.height);
  }
});

// Snapshot — send once and show detailed result
captureBtn.addEventListener('click', async () => {
  captureBtn.disabled = true;
  captureBtn.textContent = '⏳';
  try {
    const blob = await captureBlob(0.85);
    const form = new FormData();
    form.append('file', blob, 'snap.jpg');

    const res = await fetch(API, { method: 'POST', body: form });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    showResult(data);
    saveHistory(data);
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    captureBtn.disabled = false;
    captureBtn.textContent = '📸 Snapshot';
  }
});

function showResult(data) {
  const badge = document.getElementById('statusBadge');
  badge.textContent = data.status;
  badge.className = 'badge ' + data.status;
  document.getElementById('summaryText').textContent = data.summary;
  document.getElementById('annotatedImg').src = 'data:image/jpeg;base64,' + data.annotated_image;

  const tags = document.getElementById('detTags');
  tags.innerHTML = (data.detections || []).map(d =>
    `<span class="det-tag">${d.label} ${Math.round(d.confidence*100)}%</span>`
  ).join('') || '<span class="det-tag">No objects detected</span>';

  document.getElementById('resultPanel').classList.add('show');
}

document.getElementById('resultClose').addEventListener('click', () => {
  document.getElementById('resultPanel').classList.remove('show');
});

// History
function saveHistory(data) {
  const h = JSON.parse(localStorage.getItem('yolo_th') || '[]');
  h.unshift({ status: data.status, summary: data.summary, count: data.count, thumb: data.annotated_image, date: new Date().toISOString() });
  localStorage.setItem('yolo_th', JSON.stringify(h.slice(0, 30)));
}

document.getElementById('historyBtn').addEventListener('click', () => {
  const h = JSON.parse(localStorage.getItem('yolo_th') || '[]');
  const list = document.getElementById('historyList');
  list.innerHTML = h.length ? h.map((r, i) => `
    <div class="h-item">
      <img class="h-thumb" src="data:image/jpeg;base64,${r.thumb}" />
      <div class="h-info">
        <h4>Scan #${h.length - i} &nbsp;<span class="badge ${r.status}" style="font-size:0.65rem;">${r.status}</span></h4>
        <p>${new Date(r.date).toLocaleString('en-IN')}</p>
        <p style="margin-top:3px;">${r.count} object(s) detected</p>
      </div>
    </div>`).join('') : '<div class="empty">No scans yet</div>';
  document.getElementById('historyPanel').classList.add('show');
});

document.getElementById('closeHistory').addEventListener('click', () => {
  document.getElementById('historyPanel').classList.remove('show');
});
</script>
</body>
</html>
